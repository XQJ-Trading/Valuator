query: |
  아마존 분석해줘
  
  다음은 언급한 티커에 대한 전문 투자자 관점에서의 기업 분석 업무를 체계적으로 구조화한 Task Text입니다.
  
  **주제: 특정 종목(티커)에 대한 심층 분석 (전문 투자자 관점)**
  
  1.  **사업부문별 비교 분석 (Business Segment Analysis)**
      1.a. **목적 및 범위:** 기업의 각 사업부문별 성과를 비교하여 핵심 수익원과 성장 동력을 파악합니다.
      1.b. **사업부문 식별 및 정의:** 공시 자료(사업보고서 등)를 기반으로 기업의 모든 사업부문을 명확히 구분하고 정의합니다.
      1.c. **사업부문별 매출액 분석:**
          - 각 사업부문의 최근 3~5년간 매출액 추이를 분석합니다.
          - 전체 매출에서 각 부문이 차지하는 비중과 그 변화를 분석합니다.
      1.d. **사업부문별 수익성 분석:**
          - 각 사업부문의 영업이익, 이익률 등을 비교 분석합니다.
          - 수익성 기여도가 높은 핵심 사업부문을 식별합니다.
  
  2.  **핵심 사업부 심층 분석 (Core Business Deep Dive)**
      2.a. **목적 및 범위:** 핵심 사업부의 산업 생태계(전방 수요, 밸류체인)를 분석하여 차년도 실적에 영향을 미칠 긍정적 요인과 리스크를 예측합니다.
      2.b. **전방 수요처 및 밸류체인 분석:**
          - 핵심 사업부의 주요 고객사 및 최종 수요처(End-market)를 파악합니다.
          - 원재료 조달부터 최종 제품 판매까지의 밸류체인 구조를 분석합니다.
      2.c. **차년도 수요 측면 분석:**
          - 전방 산업의 시장 성장률, 고객사 투자 계획 등을 기반으로 차년도 수요를 전망합니다.
          - 수요 측면의 긍정적 요인(예: 신규 시장 개척, 고객사 점유율 확대)을 식별합니다.
          - 수요 측면의 리스크 요인(예: 전방 산업 침체, 경쟁 심화)을 식별합니다.
      2.d. **원재료 수급 측면 분석:**
          - 주요 원재료의 가격 변동 추이 및 수급 안정성을 평가합니다.
          - 원재료 수급 측면의 긍정적 요인(예: 원가 하락, 공급망 안정화)을 식별합니다.
          - 원재료 수급 측면의 리스크 요인(예: 원가 급등, 공급망 차질)을 식별합니다.
  
  3.  **재무구조 및 지배구조 리스크 분석 (Financial & Governance Risk Analysis)**
      3.a. **목적 및 범위:** 기업의 재무적 안정성과 지배구조의 투명성을 검토하여 잠재적 리스크 요인을 도출합니다.
      3.b. **재무구조 건전성 검토:**
          - 부채비율, 유동비율, 이자보상배율 등 주요 재무 안정성 지표를 분석합니다.
          - 현금흐름표를 통해 영업, 투자, 재무 활동의 건전성을 평가합니다.
      3.c. **지배구조(거버넌스) 리스크 검토:**
          - 주요 주주 구성 및 이사회 독립성을 평가합니다.
          - 특수관계자 거래, 경영진의 평판 등 잠재적 지배구조 리스크를 검토합니다.
  
  4.  **최종 투자 전망 종합 (Final Outlook Synthesis)**
      4.a. **목적 및 범위:** 앞선 모든 분석 결과를 종합하여 해당 기업에 대한 균형 잡힌 투자 전망을 제시합니다.
      4.b. **긍정적 전망(Bull Case) 정리:**
          - 분석을 통해 도출된 성장 동력, 기회 요인, 강점 등을 요약합니다.
      4.c. **부정적 전망(Bear Case) 정리:**
          - 분석을 통해 도출된 핵심 리스크, 위협 요인, 약점 등을 요약합니다.
      4.d. **결론 제시:** 긍정적/부정적 전망을 요약합니다.
baseline: |
  다음은 전문 투자자 관점에서 분석한 아마존(AMZN) 심층 분석 보고서입니다. 2026년 1월 8일 기준, 최신 2025년 3분기 실적과 2026년 시장 전망 데이터를 기반으로 작성되었습니다.
  
  아마존(AMZN) 기업 심층 분석 보고서
  1. 사업부문별 비교 분석 (Business Segment Analysis)
  1.b. 사업부문 식별 및 정의
  아마존의 사업 구조는 수익 모델과 지역에 따라 크게 세 가지 핵심 부문으로 정의됩니다.
  
  North America (북미 리테일): 미국 및 캐나다 지역의 이커머스, 오프라인 매장, 프라임 구독 서비스.
  International (해외 리테일): 유럽, 일본, 인도 등 북미 외 지역의 이커머스 및 구독 서비스.
  AWS (Amazon Web Services): 전 세계 기업, 정부, 스타트업을 대상으로 하는 클라우드 인프라(IaaS) 및 플랫폼(PaaS) 서비스.
  1.c. & 1.d. 사업부문별 매출 및 수익성 분석 (2025년 3분기 기준)
  최신 실적을 분석한 결과, 매출의 외형은 리테일이 담당하지만 실질적인 이익은 AWS가 창출하는 구조가 더욱 심화되었습니다.
  
  사업 부문 (Segment)	매출액 (Revenue)	매출 비중	영업이익 (Operating Income)	영업이익률 (OP Margin)	핵심 역할 (Key Role)
  North America	$1,063억 (106.3B)	~59%	$48억 (4.8B)	4.5%	Cash flow & Revenue Base (현금창출원)
  International	$409억 (40.9B)	~23%	$12억 (1.2B)	2.9%	Growth Market (신성장 동력, 흑자전환)
  AWS	$330억 (33.0B)	~18%	$114억 (11.4B)	34.5%	Profit Engine (핵심 이익원)
  분석 포인트:
  AWS의 압도적 수익성: 매출 비중은 18%에 불과하나, 전사 영업이익의 60% 이상을 차지합니다. AI 수요 증가로 마진율이 30% 중반대에서 견조하게 유지되고 있습니다.
  리테일 마진 개선: 과거 1~2%대에 머물던 북미 리테일 이익률이 물류 효율화(Regionalization)와 광고 매출 덕분에 **4.5%**까지 상승했습니다.
  2. 핵심 사업부 심층 분석 (Core Business Deep Dive)
  2.a. 대상 선정: AWS (성장/이익) & North America Retail (현금흐름)
  2.b. 전방 수요처 및 밸류체인 분석
  AWS (AI 인프라):
  밸류체인: 자체 칩 설계(Annapurna Labs: Trainium/Inferentia) → 데이터센터 인프라 → 클라우드 서비스(EC2, Bedrock) → 고객(엔터프라이즈/스타트업).
  경쟁력: NVIDIA GPU 의존도를 낮추기 위해 자체 AI 칩 생태계를 수직 계열화하여 원가 경쟁력을 확보했습니다.
  Retail (광고/물류):
  밸류체인: 판매자(Seller) → 풀필먼트(FBA) → 배송(Last Mile) → 소비자(Prime).
  진화: 단순 유통망을 넘어 **'리테일 미디어(광고)'**가 밸류체인의 핵심 수익원으로 부상했습니다.
  2.c. 차년도(2026년) 수요 측면 분석
  AWS (긍정적 요인):
  AI의 실적용(Production) 전환: 기업들의 생성형 AI 도입이 테스트 단계를 지나 본격적인 서비스 적용 단계로 진입하며 2026년 20~30%의 매출 성장이 전망됩니다.
  전략적 파트너십: OpenAI 등 주요 AI 기업과의 파트너십 및 대규모 수주 잔고(Backlog)가 안정적인 수요를 뒷받침합니다.
  Retail (리스크 요인):
  소비 심리 위축: 2026년 상반기 미국 소비자의 부채 부담 증가와 관세 인상 우려로 인한 '소비 숙취(Spending Hangover)' 리스크가 존재합니다. 이는 저가 상품 위주의 저소득층 소비 감소로 이어질 수 있습니다.
  2.d. 원재료 및 공급 측면 분석 (Capex)
  AI Capex 급증: AWS 데이터센터 확장을 위해 연간 $1,250억(약 175조원) 수준의 막대한 자본 지출(Capex)이 집행되고 있습니다. 이는 단기 현금흐름에 부담이나, AWS의 고마진 구조가 이를 상쇄할 수 있을지가 관건입니다.
  공급망 자동화: 리테일 부문은 100만 대 이상의 로봇(Sparrow 등) 도입으로 인건비 상승 압력을 구조적으로 상쇄하고 있습니다.
  3. 재무구조 및 지배구조 리스크 분석 (Financial & Governance Risk Analysis)
  3.b. 재무구조 건전성 검토
  대차대조표(Balance Sheet): 총자산 약 $6,200억 대비 총부채 약 $3,820억으로, 부채비율(Debt-to-Equity)은 0.6~0.7x 수준의 건전한 상태를 유지하고 있습니다.
  유동성: 막대한 현금성 자산을 보유하고 있어, 고금리 환경이나 대규모 AI 투자(Capex) 집행에도 외부 자금 조달 리스크는 매우 낮습니다.
  현금흐름(Cash Flow): 영업활동 현금흐름(OCF)은 강력하지만, Capex 급증으로 인해 2026년 잉여현금흐름(FCF) 수익률은 일시적으로 압박받을 수 있습니다. '투자 회수기'가 아닌 '투자 집중기'임을 인지해야 합니다.
  3.c. 지배구조(거버넌스) 리스크 검토
  FTC 반독점 소송 (최대 리스크): 미 연방거래위원회(FTC)와의 소송이 2026년에도 지속될 전망입니다.
  핵심 쟁점: 아마존의 '바이박스(Buy Box)' 알고리즘과 FBA(풀필먼트) 강요 의혹.
  전망: 기업 분할(Breakup)보다는 '행태적 시정 조치(Behavioral Remedies)' 가능성이 높습니다. 이는 자사 브랜드(PB) 우선 노출 금지 등으로 이어져 리테일 마진에 하방 압력을 줄 수 있습니다.
  4. 최종 투자 전망 종합 (Final Outlook Synthesis)
  4.b. 긍정적 전망 (Bull Case)
  "마진의 구조적 레벨업": AWS는 자체 칩(Trainium) 비중 확대로 이익률 40% 도달, 리테일은 광고 매출($85B+)과 로봇 자동화로 구조적 흑자 구조가 정착됩니다.
  AI 인프라 패권: 마이크로소프트/구글과의 경쟁에서 압도적인 인프라 효율성을 증명하며, 클라우드 부문이 기업 가치 재평가(Re-rating)를 주도합니다.
  4.c. 부정적 전망 (Bear Case)
  "Capex의 늪": 천문학적인 AI 투자가 실제 매출 성장으로 연결되는 속도가 예상보다 느릴 경우, **투자자본수익률(ROIC)**이 급격히 훼손될 수 있습니다.
  규제 리스크 현실화: FTC 소송 결과가 예상보다 강경할 경우, 아마존의 강력한 경쟁력인 '플라이휠(Flywheel)' 모델(프라임-물류-판매 연계)이 약화될 수 있습니다.
  4.d. 결론
  아마존은 현재 '유통 기업'에서 'AI 인프라 유틸리티 기업'으로 체질이 완전히 변화하는 구간에 있습니다.
  
  투자 의견: 2026년 투자의 핵심 지표는 **"AWS 매출 성장률(20% 이상 유지 여부)"**과 **"리테일 영업이익률(4%대 안착 여부)"**입니다. 현재 데이터상 AWS의 이익 창출력과 리테일의 현금 흐름이 견고하므로, 규제 리스크를 감안하더라도 장기적 관점의 매수(Buy) 매력도가 높습니다.
